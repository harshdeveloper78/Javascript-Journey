<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <script>
        //Adding element in array
        const fruits = ['apple', 'banana', 'grapes']
        fruits.push('pinneapple')
        console.log(fruits);

        //Removing element in array
        fruits.pop()
        console.log(fruits);

        //add element at the beginning of array
        fruits.unshift('mango')
        console.log(fruits);

        //Revove the first element of array
        fruits.shift('papaya')
        console.log(fruits)

        //add and remove element according to your choise
        fruits.splice(1, 1);
        console.log(fruits);

        fruits.splice(1, 1, 'coconut')
        console.log(fruits);

    </script>
</body>
</html>
