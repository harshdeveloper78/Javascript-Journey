<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <div id="1">
  <p>Initial content</p>
</div>
    <Script>
        //it is used to change inner text of html
let element = document.getElementById("1");
element.innerHTML = "<b>This is the new content.</b>";
console.log(element.innerHTML); 


    </Script>
</body>
</html>
