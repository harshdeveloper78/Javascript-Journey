<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyup</title>
</head>
<body>
    <h2 id="text">Press any key</h2>
    <script>
        //it works when you release the key
        document.addEventListener("keyup", function(){
            document.getElementById("text").innerText = "key is relesed";
        });

    </script>
</body>
</html>
