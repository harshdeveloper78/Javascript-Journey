<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <h1 id="1" class="2"> DOM </h1>


    <script>
        //It is used to Structure,style and change the content of webpage
        //Element selector 
        //by id 
        const result = document.getElementById(1);
        console.log(result);

        //by class
         const result1 = document.getElementsByClassName(2);
        console.log(result1);

        //by queryselector
        const result2 = document.querySelector('h1')
         console.log(result2);
    </script>
</body>
</html>
