<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disable Button</title>
</head>
<body>
    <button id="btn">Click me</button>
    <button id="disable">Disable Button</button>
    <p id="message"></p>
    <button id="enable">Enable Button</button>
    <script>
        const btn = document.querySelector("#btn");
        const disableBtn = document.querySelector("#disable");
        const enableBtn = document.querySelector("#enable");
        const message = document.querySelector("#message")

        btn.addEventListener("click", function(){
            message.innerText = "Button is Clicked";
        });

        disableBtn.addEventListener("click", function(){
            btn.disabled = true;
        });

        enable.addEventListener("click", function(){
            btn.disabled = false;
        })

    </script>
</body>
</html>
