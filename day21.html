<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>popup</title>
</head>
<body>
    <button id="popup">Click me</button>
    <script>
        const popup =document.getElementById("popup");
        popup.addEventListener("click", function(){
            alert("popup message");
        });
    </script>
</body>
</html>
